<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#27ae60">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="白酒价格记录">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>白酒价格记录</title>
<style>
:root{--bg-color:#f8f9fa;--brand-bg:#fff;--text-main:#2d3436;--text-gray:#95a5a6;--accent:#27ae60;--price-red:#d63031;}body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg-color);margin:0;padding:8px;color:var(--text-main);font-size:13px}header{text-align:center;padding:12px 0;background:#fff;border-radius:6px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}header h2{margin:0;font-size:1.2rem;color:#b33939}header h2 span{font-size:.8rem;color:#666}.toolbar{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:10px}.btn-tool{border:none;padding:5px 12px;border-radius:15px;font-size:.75rem;color:#fff}.btn-add{background:var(--accent)}.btn-rank{background:#e67e22}.btn-data{background:#636e72}.brand-section{margin-bottom:15px}.brand-header{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;margin-bottom:6px;border-left:4px solid var(--accent);background:linear-gradient(to right,#eee,transparent)}.brand-title{font-weight:bold;font-size:1rem}.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px}.product-card{background:#fff;border-radius:6px;padding:8px;box-shadow:0 1px 2px rgba(0,0,0,.08);display:flex;flex-direction:column;border:1px solid #eee}.product-card:active{transform:scale(.96)}.product-name{font-weight:500;margin-bottom:4px;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.price-now{font-size:1rem;font-weight:bold;color:var(--price-red)}.price-change{font-size:.7rem;margin-top:2px}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center}.modal{background:#fff;padding:15px;border-radius:10px;width:88%;max-width:320px;max-height:85vh;overflow-y:auto}.modal h3{margin-top:0;font-size:1rem;border-bottom:1px solid #eee;padding-bottom:8px}.modal input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;font-size:1rem}.history-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #eee;font-size:.85rem}.history-date{color:#888}.btn-group{display:flex;gap:8px;margin-top:10px}.btn-group button{flex:1;padding:8px;border:none;border-radius:4px}.tip{font-size:12px;color:#666;margin-top:6px;line-height:1.5}
</style></head><body>
<header><h2>白酒价格记录<span>(两瓶装)</span></h2><div class='toolbar'><button class='btn-tool btn-add' onclick="openInputModal('brand')">+ 新增品牌</button><button class='btn-tool btn-rank' id='rankBtn' onclick='toggleRankView()'>降价排行模式</button><button class='btn-tool btn-data' onclick='exportData()'>导出</button><button class='btn-tool btn-data' onclick="document.getElementById('fileInput').click()">导入</button><input id='fileInput' type='file' accept='.json,application/json' style='display:none' onchange='importData(event)'></div></header>
<div id='mainContainer'></div><div id='rankContainer' style='display:none'><div class='brand-header'><span class='brand-title'>📉 降价幅度百分比排行</span></div><div class='product-grid' id='rankGrid'></div></div>
<div class='modal-overlay' id='inputModal'><div class='modal'><h3 id='inputModalTitle'>添加信息</h3><input id='field1' placeholder='名称'><input id='field2' type='number' placeholder='两瓶总价(元)'><div class='btn-group'><button onclick="closeModal('inputModal')">取消</button><button style='background:var(--accent);color:#fff' onclick='handleInputSubmit()'>保存</button></div></div></div>
<div class='modal-overlay' id='detailModal'><div class='modal'><h3>单品详情</h3><label>修改名称：</label><input id='editProductName'><div id='historyContent'></div><hr><input id='newPriceInput' type='number' placeholder='输入最新两瓶价格'><input id='offlinePriceInput' type='number' placeholder='输入线下参考价格'><div id='offlineCompare' class='tip'></div><div class='btn-group'><button style='background:var(--accent);color:#fff' onclick='handlePriceUpdate()'>更新线上价</button><button style='background:#f39c12;color:#fff' onclick='handleOfflineUpdate()'>线下价</button></div><div class='btn-group'><button onclick='handleDeleteProduct()' style='background:#dfe6e9;color:#ff7675'>删除</button></div><button onclick="closeModal('detailModal')" style='width:100%;margin-top:10px;background:none;border:none;color:#999'>关闭</button></div></div>
<script>
const defaultBrands={"习酒":["金质","金钻","感恩98"],"五粮液":["五粮春"],"茅台":["金王子","酱香经典","紫迎宾"],"古井贡酒":["古5","古8"],"酒鬼酒":["传承","黄坛","馥郁经典"],"赖茅":["端曲蓝","传禧"],"泸州老窖":["晶彩特曲"],"西凤":["华山20年","华山10年"],"郎酒":["普郎"],"汾酒":["红花","老白汾10"],"舍得":["舍之道天道"]};
let liquorData=JSON.parse(localStorage.getItem('liquorDataV4')); if(!liquorData){liquorData={};for(let b in defaultBrands){liquorData[b]=defaultBrands[b].map(n=>({name:n,history:[],offlineHistory:[]}));}save();}
let state={brand:'',product:'',isRankView:false,mode:''};
function getToday(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function save(){localStorage.setItem('liquorDataV4',JSON.stringify(liquorData));}
function saveAndReload(){save();render();}
function createCard(brand,item){const h=item.history||[];let price='待录入',chg='--',bg='#fff',tc='inherit';if(h.length){const first=h[0].p,cur=h[h.length-1].p,d=cur-first,rate=first>cur?(first-cur)/first:0;price='¥'+cur;chg=d===0?'未变动':d>0?`↑¥${d}`:`↓¥${Math.abs(d)}`;if(rate>0){const l=Math.max(45,96-rate*160);bg=`hsl(145,75%,${l}%)`;if(rate>.3)tc='#fff';}}const div=document.createElement('div');div.className='product-card';div.style.background=bg;div.style.color=tc;div.onclick=()=>openDetailModal(brand,item.name);div.innerHTML=`<div class='product-name'>${item.name}</div><div class='price-now'>${price}</div><div class='price-change'>${chg}</div>`;return div;}
function renderGroups(){const c=document.getElementById('mainContainer');c.innerHTML='';Object.keys(liquorData).forEach(brand=>{const s=document.createElement('div');s.className='brand-section';s.innerHTML=`<div class='brand-header'><span class='brand-title'>${brand}</span><div><span style='color:var(--accent)' onclick="openInputModal('product','${brand}')">+单品</span> <span style='color:#999' onclick="deleteBrand('${brand}')">删除</span></div></div>`;const g=document.createElement('div');g.className='product-grid';liquorData[brand].forEach(i=>g.appendChild(createCard(brand,i)));s.appendChild(g);c.appendChild(s);});}
function renderRank(){const g=document.getElementById('rankGrid');g.innerHTML='';let arr=[];for(let b in liquorData){liquorData[b].forEach(i=>{if(i.history?.length){const f=i.history[0].p,c=i.history.at(-1).p,r=f>c?(f-c)/f:(f<c?-1:0);arr.push({b,i,r});}})}arr.sort((a,b)=>b.r-a.r);arr.forEach(x=>g.appendChild(createCard(x.b,x.i)));}
function render(){document.getElementById('mainContainer').style.display=state.isRankView?'none':'block';document.getElementById('rankContainer').style.display=state.isRankView?'block':'none';state.isRankView?renderRank():renderGroups();}
function toggleRankView(){state.isRankView=!state.isRankView;document.getElementById('rankBtn').innerText=state.isRankView?'返回品牌模式':'降价排行模式';render();}
function openDetailModal(brand,name){state.brand=brand;state.product=name;const item=liquorData[brand].find(x=>x.name===name);if(!item.offlineHistory)item.offlineHistory=[];document.getElementById('editProductName').value=item.name;document.getElementById('historyContent').innerHTML=(item.history||[]).map(h=>`<div class='history-item'><span class='history-date'>${h.t}</span><span>¥${h.p}</span></div>`).reverse().join('')||'暂无价格记录';renderOfflineCompare(item);document.getElementById('detailModal').style.display='flex';}
function renderOfflineCompare(item){const box=document.getElementById('offlineCompare');const on=item.history?.length?item.history.at(-1).p:null;const off=item.offlineHistory?.length?item.offlineHistory.at(-1).p:null;if(off==null){box.innerHTML='暂无线下参考价';return;}if(on==null){box.innerHTML=`最近线下价：¥${off}`;return;}const diff=on-off;box.innerHTML=diff>0?`线上 ¥${on}｜线下 ¥${off}（线下便宜 ¥${diff}）`:diff<0?`线上 ¥${on}｜线下 ¥${off}（线下贵 ¥${Math.abs(diff)}）`:`线上 ¥${on}｜线下 ¥${off}（价格一致）`;}
function handlePriceUpdate(){const item=liquorData[state.brand].find(x=>x.name===state.product);const nm=document.getElementById('editProductName').value.trim();const p=parseFloat(document.getElementById('newPriceInput').value);if(nm)item.name=nm;if(!isNaN(p))item.history.push({p,t:getToday()});saveAndReload();closeModal('detailModal');}
function handleOfflineUpdate(){const item=liquorData[state.brand].find(x=>x.name===state.product);const p=parseFloat(document.getElementById('offlinePriceInput').value);if(isNaN(p))return;if(!item.offlineHistory)item.offlineHistory=[];item.offlineHistory.push({p,t:getToday()});saveAndReload();closeModal('detailModal');}
function openInputModal(mode,brand=''){state.mode=mode;state.brand=brand;document.getElementById('inputModal').style.display='flex';document.getElementById('field2').style.display=mode==='brand'?'none':'block';document.getElementById('inputModalTitle').innerText=mode==='brand'?'新增品牌':'新增单品';}
function handleInputSubmit(){const n=document.getElementById('field1').value.trim();const p=parseFloat(document.getElementById('field2').value);if(state.mode==='brand'&&n){if(!liquorData[n])liquorData[n]=[];}else if(state.mode==='product'&&n){liquorData[state.brand].push({name:n,history:isNaN(p)?[]:[{p,t:getToday()}],offlineHistory:[]});}saveAndReload();closeModal('inputModal');}
function exportData(){const blob=new Blob([JSON.stringify(liquorData,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='白酒数据_'+Date.now()+'.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{liquorData=JSON.parse(ev.target.result);saveAndReload();alert('数据导入成功！')}catch(err){alert('导入失败')}};r.readAsText(f);e.target.value='';}
function deleteBrand(b){if(confirm('删除品牌 '+b+'？')){delete liquorData[b];saveAndReload();}}
function handleDeleteProduct(){if(confirm('确定删除？')){liquorData[state.brand]=liquorData[state.brand].filter(x=>x.name!==state.product);saveAndReload();closeModal('detailModal');}}
function closeModal(id){document.getElementById(id).style.display='none';document.querySelectorAll('input').forEach(i=>i.value='');}
render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>
</body></html>
